<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Petersik & Pantle (1979) — Ternus Display</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a1a; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:#aaa; }
canvas { background:#808080; display:block; }
.controls { margin-top:18px; display:flex; align-items:center; gap:20px; font-size:13px; }
input[type=range] { width:180px; accent-color:#888; }
button { background:#333; color:#ddd; border:1px solid #555; padding:5px 14px; border-radius:4px; cursor:pointer; font-size:13px; }
.meta { margin-top:20px; font-size:11px; color:#555; max-width:560px; text-align:center; line-height:1.5; }
</style>
</head>
<body>
<canvas id="c" width="560" height="280"></canvas>
<div class="controls">
  <button id="btn">Pause</button>
  <label>ISI: <span id="lbl">35</span> ms &nbsp;<input type="range" id="isi" min="10" max="200" value="35" step="5"></label>
</div>
<div class="meta">Petersik &amp; Pantle (1979). Frame: 200 ms. Ternus 3-dot display — element vs group motion.</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const btn = document.getElementById('btn');
const isiSlider = document.getElementById('isi');
const lbl = document.getElementById('lbl');

const CX = c.width / 2, CY = c.height / 2;
const R = 14;       // dot radius px
const SEP = 60;     // dot spacing px
const FRAME_MS = 200;

// Frame 1: x = -SEP, 0, +SEP  relative to center
// Frame 2: x =   0, +SEP, +2*SEP  (shift right by SEP)
const F1 = [-SEP, 0, SEP];
const F2 = [0, SEP, 2 * SEP];

let isiMs = 35;
let running = true;
let phase = 'f1';  // f1 | isi1 | f2 | isi2
let phaseStart = performance.now();

function draw(dots) {
  ctx.fillStyle = '#808080';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#000';
  for (const x of dots) {
    ctx.beginPath();
    ctx.arc(CX + x, CY, R, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBlank() {
  ctx.fillStyle = '#808080';
  ctx.fillRect(0, 0, c.width, c.height);
}

function tick(now) {
  if (!running) { requestAnimationFrame(tick); return; }

  const elapsed = now - phaseStart;
  const durations = { f1: FRAME_MS, isi1: isiMs, f2: FRAME_MS, isi2: isiMs };

  if (elapsed >= durations[phase]) {
    phaseStart = now;
    const order = ['f1', 'isi1', 'f2', 'isi2'];
    phase = order[(order.indexOf(phase) + 1) % 4];
  }

  if (phase === 'f1') draw(F1);
  else if (phase === 'f2') draw(F2);
  else drawBlank();

  requestAnimationFrame(tick);
}

isiSlider.addEventListener('input', () => {
  isiMs = +isiSlider.value;
  lbl.textContent = isiMs;
});

btn.addEventListener('click', () => {
  running = !running;
  btn.textContent = running ? 'Pause' : 'Play';
  if (running) phaseStart = performance.now();
});

requestAnimationFrame(tick);
</script>
</body>
</html>
