<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hein & Cavanagh (2012) — Ternus + Spatiotopic</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a1a; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:#aaa; }
canvas { background:#808080; display:block; }
.controls { margin-top:18px; display:flex; align-items:center; gap:24px; font-size:13px; flex-wrap:wrap; justify-content:center; }
input[type=range] { width:160px; accent-color:#888; }
button { background:#333; color:#ddd; border:1px solid #555; padding:5px 14px; border-radius:4px; cursor:pointer; font-size:13px; }
.meta { margin-top:16px; font-size:11px; color:#555; max-width:540px; text-align:center; line-height:1.5; }
</style>
</head>
<body>
<canvas id="c" width="580" height="300"></canvas>
<div class="controls">
  <button id="btn">Pause</button>
  <label>ISI: <span id="lbl">80</span> ms &nbsp;<input type="range" id="isi" min="20" max="200" value="80" step="10"></label>
  <button id="eyeBtn">Eye movement: OFF</button>
</div>
<div class="meta">Hein &amp; Cavanagh (2012). Frame: 200 ms. With eye movement, F2 stays at same world position — tests spatiotopic vs retinotopic grouping.</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const btn = document.getElementById('btn');
const isiSlider = document.getElementById('isi');
const lbl = document.getElementById('lbl');
const eyeBtn = document.getElementById('eyeBtn');

const CY = c.height / 2;
const SEP = 50;
const R = 14;
const FRAME_MS = 200;
let isiMs = 80, running = true, phase = 'f1', phaseStart = performance.now();
let eyeMove = false;

// F1 center at CX, F2 center at CX + SEP (standard Ternus shift right by SEP)
// With eye movement: eye moves right by SEP during ISI,
// so F2 is shown at CX (same world position) but drawn at CX-SEP on screen
// to simulate retinal shift — actually we shift F2 left on canvas to cancel retinal shift

function f1CX() { return c.width / 2 - SEP; }
function f2CX() {
  const base = c.width / 2;
  return eyeMove ? base - SEP : base; // retinal shift cancels if eye moved
}

function draw(cx, showArrow) {
  ctx.fillStyle = '#808080';
  ctx.fillRect(0, 0, c.width, c.height);

  // Fixation cross
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  const fx = c.width / 2, fy = CY;
  ctx.beginPath(); ctx.moveTo(fx - 8, fy); ctx.lineTo(fx + 8, fy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(fx, fy - 8); ctx.lineTo(fx, fy + 8); ctx.stroke();

  ctx.fillStyle = '#fff';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(cx + (i - 1) * SEP, CY, R, 0, Math.PI * 2);
    ctx.fill();
  }

  if (showArrow && eyeMove) {
    // Arrow indicating eye movement direction
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(c.width / 2 - 20, CY - 50);
    ctx.lineTo(c.width / 2 + 20, CY - 50);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(c.width / 2 + 12, CY - 55);
    ctx.lineTo(c.width / 2 + 20, CY - 50);
    ctx.lineTo(c.width / 2 + 12, CY - 45);
    ctx.stroke();
  }
}

function drawBlank(showArrow) {
  ctx.fillStyle = '#808080';
  ctx.fillRect(0, 0, c.width, c.height);
  const fx = c.width / 2, fy = CY;
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(fx-8,fy); ctx.lineTo(fx+8,fy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(fx,fy-8); ctx.lineTo(fx,fy+8); ctx.stroke();
  if (showArrow && eyeMove) {
    ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(fx-20, CY-50); ctx.lineTo(fx+20, CY-50); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx+12,CY-55); ctx.lineTo(fx+20,CY-50); ctx.lineTo(fx+12,CY-45); ctx.stroke();
  }
}

function tick(now) {
  if (!running) { requestAnimationFrame(tick); return; }
  const elapsed = now - phaseStart;
  const dur = { f1: FRAME_MS, isi1: isiMs, f2: FRAME_MS, isi2: isiMs };
  if (elapsed >= dur[phase]) {
    phaseStart = now;
    const order = ['f1','isi1','f2','isi2'];
    phase = order[(order.indexOf(phase)+1)%4];
  }
  if (phase === 'f1') draw(f1CX(), false);
  else if (phase === 'f2') draw(f2CX(), false);
  else drawBlank(phase === 'isi1');
  requestAnimationFrame(tick);
}

isiSlider.addEventListener('input', () => { isiMs = +isiSlider.value; lbl.textContent = isiMs; });
btn.addEventListener('click', () => { running = !running; btn.textContent = running ? 'Pause' : 'Play'; if (running) phaseStart = performance.now(); });
eyeBtn.addEventListener('click', () => { eyeMove = !eyeMove; eyeBtn.textContent = `Eye movement: ${eyeMove ? 'ON' : 'OFF'}`; });
requestAnimationFrame(tick);
</script>
</body>
</html>
