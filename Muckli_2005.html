<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Muckli et al. (2005) — Two-Flash AM (fMRI)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a1a; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:#aaa; }
canvas { background:#808080; display:block; }
.controls { margin-top:18px; display:flex; align-items:center; gap:24px; font-size:13px; flex-wrap:wrap; justify-content:center; }
input[type=range] { width:160px; accent-color:#888; }
button { background:#333; color:#ddd; border:1px solid #555; padding:5px 14px; border-radius:4px; cursor:pointer; font-size:13px; }
select { background:#333; color:#ddd; border:1px solid #555; padding:5px 10px; border-radius:4px; font-size:13px; }
.meta { margin-top:16px; font-size:11px; color:#555; max-width:540px; text-align:center; line-height:1.5; }
</style>
</head>
<body>
<canvas id="c" width="560" height="320"></canvas>
<div class="controls">
  <button id="btn">Pause</button>
  <label>SOA: <span id="lbl">120</span> ms &nbsp;<input type="range" id="soa" min="40" max="400" value="120" step="20"></label>
  <select id="mode">
    <option value="am" selected>AM condition</option>
    <option value="flicker">Flicker control</option>
  </select>
</div>
<div class="meta">Muckli et al. (2005). Two large discs alternate — fMRI shows V1 activation along the empty path between them even when no stimulus is there.</div>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
const CX=c.width/2, CY=c.height/2;
const R=55;
const LX=CX-140, RX=CX+140;
let soaMs=120, running=true, phase='f1', phaseStart=performance.now();

function draw(leftOn, rightOn) {
  ctx.fillStyle='#808080'; ctx.fillRect(0,0,c.width,c.height);
  const mode=document.getElementById('mode').value;
  if(mode==='flicker') {
    // both flash together
    if(leftOn||rightOn){
      ctx.fillStyle='#111';
      ctx.beginPath(); ctx.arc(LX,CY,R,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(RX,CY,R,0,Math.PI*2); ctx.fill();
    }
    return;
  }
  ctx.fillStyle='#111';
  if(leftOn){ctx.beginPath();ctx.arc(LX,CY,R,0,Math.PI*2);ctx.fill();}
  if(rightOn){ctx.beginPath();ctx.arc(RX,CY,R,0,Math.PI*2);ctx.fill();}
}

function tick(now) {
  if(!running){requestAnimationFrame(tick);return;}
  const FRAME_MS=soaMs*0.5;
  const isiMs=soaMs*0.5;
  const elapsed=now-phaseStart;
  const dur={f1:FRAME_MS,isi1:isiMs,f2:FRAME_MS,isi2:isiMs};
  if(elapsed>=dur[phase]){phaseStart=now;const o=['f1','isi1','f2','isi2'];phase=o[(o.indexOf(phase)+1)%4];}
  if(phase==='f1') draw(true,false);
  else if(phase==='f2') draw(false,true);
  else draw(false,false);
  requestAnimationFrame(tick);
}

document.getElementById('soa').addEventListener('input',e=>{soaMs=+e.target.value;document.getElementById('lbl').textContent=soaMs;});
document.getElementById('btn').addEventListener('click',()=>{running=!running;document.getElementById('btn').textContent=running?'Pause':'Play';if(running)phaseStart=performance.now();});
requestAnimationFrame(tick);
</script>
</body>
</html>
