<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farrell & Shepard (1981) — Polygon Rotation AM</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a1a; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:#aaa; }
canvas { background:#111; display:block; }
.controls { margin-top:18px; display:flex; align-items:center; gap:24px; font-size:13px; flex-wrap:wrap; justify-content:center; }
input[type=range] { width:160px; accent-color:#888; }
button { background:#333; color:#ddd; border:1px solid #555; padding:5px 14px; border-radius:4px; cursor:pointer; font-size:13px; }
.meta { margin-top:16px; font-size:11px; color:#555; max-width:560px; text-align:center; line-height:1.5; }
</style>
</head>
<body>
<canvas id="c" width="540" height="380"></canvas>
<div class="controls">
  <button id="btn">Pause</button>
  <label>SOA: <span id="lbl">300</span> ms &nbsp;<input type="range" id="soa" min="50" max="800" value="300" step="50"></label>
  <label>Rotation: <span id="rotLbl">60</span>° &nbsp;<input type="range" id="rot" min="30" max="180" value="60" step="30"></label>
</div>
<div class="meta">Farrell &amp; Shepard (1981). Asymmetric polygon in two rotations — minimum SOA for apparent rigid rotation scales ~2.4 ms/° of angular disparity.</div>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
const CX=c.width/2, CY=c.height/2;
let soaMs=300, running=true, phase='f1', phaseStart=performance.now();

// Irregular polygon vertices (asymmetric, no rotational symmetry)
const BASE_VERTS = [
  [0,-80],[30,-50],[70,-35],[60,10],
  [35,55],[-10,70],[-55,45],[-65,-5],
  [-50,-45],[-20,-75]
];

function drawPolygon(angleDeg) {
  const angle=angleDeg*Math.PI/180;
  const cos_=Math.cos(angle), sin_=Math.sin(angle);
  const verts=BASE_VERTS.map(([x,y])=>[x*cos_-y*sin_+CX, x*sin_+y*cos_+CY]);
  ctx.beginPath();
  ctx.moveTo(...verts[0]);
  for(let i=1;i<verts.length;i++) ctx.lineTo(...verts[i]);
  ctx.closePath();
  ctx.fillStyle='rgba(180,200,255,0.15)';
  ctx.fill();
  ctx.strokeStyle='#a0b8ff';
  ctx.lineWidth=2;
  ctx.stroke();
}

function tick(now) {
  if(!running){requestAnimationFrame(tick);return;}
  const FRAME_MS=soaMs*0.5, isiMs=soaMs*0.5;
  const disparity=+document.getElementById('rot').value;
  const e=now-phaseStart, dur={f1:FRAME_MS,isi1:isiMs,f2:FRAME_MS,isi2:isiMs};
  if(e>=dur[phase]){phaseStart=now;const o=['f1','isi1','f2','isi2'];phase=o[(o.indexOf(phase)+1)%4];}
  ctx.fillStyle='#111'; ctx.fillRect(0,0,c.width,c.height);
  if(phase==='f1') drawPolygon(0);
  else if(phase==='f2') drawPolygon(disparity);
  requestAnimationFrame(tick);
}

document.getElementById('soa').addEventListener('input',e=>{soaMs=+e.target.value;document.getElementById('lbl').textContent=soaMs;});
document.getElementById('rot').addEventListener('input',e=>{document.getElementById('rotLbl').textContent=e.target.value;});
document.getElementById('btn').addEventListener('click',()=>{running=!running;document.getElementById('btn').textContent=running?'Pause':'Play';if(running)phaseStart=performance.now();});
requestAnimationFrame(tick);
</script>
</body>
</html>
