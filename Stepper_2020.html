<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stepper et al. (2020) — Ternus + Ponzo Depth</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a1a; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:#aaa; }
canvas { display:block; }
.controls { margin-top:18px; display:flex; align-items:center; gap:24px; font-size:13px; flex-wrap:wrap; justify-content:center; }
input[type=range] { width:160px; accent-color:#888; }
button { background:#333; color:#ddd; border:1px solid #555; padding:5px 14px; border-radius:4px; cursor:pointer; font-size:13px; }
.meta { margin-top:16px; font-size:11px; color:#555; max-width:540px; text-align:center; line-height:1.5; }
</style>
</head>
<body>
<canvas id="c" width="560" height="360"></canvas>
<div class="controls">
  <button id="btn">Pause</button>
  <label>ISI: <span id="lbl">80</span> ms &nbsp;<input type="range" id="isi" min="0" max="240" value="80" step="10"></label>
  <button id="bgBtn">Ponzo: OFF</button>
</div>
<div class="meta">Stepper et al. (2020). Frame: 133 ms. Two circles translate horizontally. Ponzo corridor implies depth — left pair appears far, right pair near.</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const btn = document.getElementById('btn');
const isiSlider = document.getElementById('isi');
const lbl = document.getElementById('lbl');
const bgBtn = document.getElementById('bgBtn');

const CX = c.width / 2, CY = c.height / 2;
const FRAME_MS = 133;

// Frame 1: pair at left (x=-110), Frame 2: pair at right (x=+110)
const F1X = -110, F2X = 110;
const DY = 40; // vertical separation between the 2 circles
const R = 22;

let isiMs = 80, running = true, phase = 'f1', phaseStart = performance.now();
let ponzo = false;

function drawPonzo() {
  // Converging railroad-track lines
  const vanX = CX, vanY = 40;
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1.5;
  // Left rail
  ctx.beginPath(); ctx.moveTo(60, c.height); ctx.lineTo(vanX - 10, vanY); ctx.stroke();
  // Right rail
  ctx.beginPath(); ctx.moveTo(c.width - 60, c.height); ctx.lineTo(vanX + 10, vanY); ctx.stroke();
  // Horizontal rungs (texture gradient)
  for (let t = 0; t < 1; t += 0.18) {
    const y = vanY + t * (c.height - vanY);
    const halfW = 10 + t * (c.width / 2 - 70);
    ctx.beginPath(); ctx.moveTo(vanX - halfW, y); ctx.lineTo(vanX + halfW, y); ctx.stroke();
  }
}

function draw(frameX) {
  ctx.fillStyle = '#c0c0c0';
  ctx.fillRect(0, 0, c.width, c.height);
  if (ponzo) drawPonzo();
  ctx.fillStyle = '#222';
  for (const dy of [-DY, DY]) {
    ctx.beginPath();
    ctx.arc(CX + frameX, CY + dy, R, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBlank() {
  ctx.fillStyle = '#c0c0c0';
  ctx.fillRect(0, 0, c.width, c.height);
  if (ponzo) drawPonzo();
}

function tick(now) {
  if (!running) { requestAnimationFrame(tick); return; }
  const elapsed = now - phaseStart;
  const dur = { f1: FRAME_MS, isi1: isiMs, f2: FRAME_MS, isi2: isiMs };
  if (elapsed >= dur[phase]) {
    phaseStart = now;
    const order = ['f1','isi1','f2','isi2'];
    phase = order[(order.indexOf(phase)+1)%4];
  }
  if (phase === 'f1') draw(F1X);
  else if (phase === 'f2') draw(F2X);
  else drawBlank();
  requestAnimationFrame(tick);
}

isiSlider.addEventListener('input', () => { isiMs = +isiSlider.value; lbl.textContent = isiMs; });
btn.addEventListener('click', () => { running = !running; btn.textContent = running ? 'Pause' : 'Play'; if (running) phaseStart = performance.now(); });
bgBtn.addEventListener('click', () => { ponzo = !ponzo; bgBtn.textContent = `Ponzo: ${ponzo ? 'ON' : 'OFF'}`; });
requestAnimationFrame(tick);
</script>
</body>
</html>
